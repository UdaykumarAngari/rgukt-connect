version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rgukt-postgres
    environment:
      POSTGRES_DB: rgukt_connect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rgukt_connect"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rgukt-backend
    ports:
      - "4000:8000"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/rgukt_connect
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgrespassword
      - JWT_SECRET=rgukt_connect_enterprise_level_secure_jwt_signing_key_2026_string
      - AWS_ACCESS_KEY_ID=mock_key
      - AWS_SECRET_ACCESS_KEY=mock_secret
      - AWS_REGION=us-east-1
      - AWS_BUCKET_NAME=mock_bucket
      - MAIL_USERNAME=mock_mail@gmail.com
      - MAIL_PASSWORD=mock_password
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
